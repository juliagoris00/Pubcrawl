<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#180025" />
  <title>Lille Bar Crawl Bingo</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true"><span></span><span></span><span></span></div>

  <main class="app-shell">
    <section id="welcome" class="screen screen--active hero-card">
      <div class="badge">🍻 Lille Bar Crawl 2026</div>
      <h1>Bar Crawl Bingo</h1>
      <p class="sub">Vul je naam in, krijg je eigen kaart en strijd live om de bovenste plek.</p>

      <form id="joinForm" class="join-form">
        <label for="playerName">Jouw naam</label>
        <input id="playerName" maxlength="24" autocomplete="nickname" placeholder="Bijv. Julia" required />
        <button class="primary" type="submit">Start bingo 🎲</button>
      </form>

      <div class="status-pill" id="connectionStatus">Live-scorebord wordt geladen…</div>
      <a class="admin-link" href="admin.html">Host / admin</a>
    </section>

    <section id="game" class="screen game-screen">
      <header class="topbar">
        <div>
          <p class="eyebrow">Lille Bar Crawl</p>
          <h2 id="helloName">Bingo</h2>
        </div>
        <button id="shareBtn" class="ghost small">Delen</button>
      </header>

      <div class="stats-row">
        <div class="stat-card"><strong id="scoreCount">0/25</strong><span>Voltooid</span></div>
        <div class="stat-card"><strong id="bingoCount">0</strong><span>Bingo's</span></div>
        <div class="stat-card"><strong id="rankText">–</strong><span>Plek</span></div>
      </div>

      <section class="board-card">
        <div id="bingoBoard" class="bingo-board" aria-label="Bingokaart"></div>
      </section>

      <section class="leaderboard-card">
        <div class="section-head">
          <h3>🏆 Live-scorebord</h3>
          <span id="playerCount">0 spelers</span>
        </div>
        <ol id="leaderboard" class="leaderboard"></ol>
      </section>

      <div class="button-row">
        <button id="newCardBtn" class="ghost">Nieuwe kaart</button>
        <button id="resetMineBtn" class="ghost danger">Mijn kaart resetten</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="confetti" class="confetti" aria-hidden="true"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
